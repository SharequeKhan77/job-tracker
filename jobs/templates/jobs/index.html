<!DOCTYPE html>
<html>
<head>
    <title>Job Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Job Tracker</a>
        <a href="/logout/" class="btn btn-outline-light">Logout</a>
    </div>
</nav>
<div class="container mt-4">
    <h1>Job Applications</h1>
    <a href="/add/" class="btn btn-primary mb-3">Add Job</a>
    <table class="table table-bordered table-striped">
        <tr>
            <th>Company</th>
            <th>Position</th>
            <th>Status</th>
            <th>Date Applied</th>
            <th>Actions</th>
        </tr>
        {% for job in jobs %}
        <tr>
            <td>{{ job.company }}</td>
            <td>{{ job.position }}</td>
            <td>{{ job.status }}</td>
            <td>{{ job.date_applied }}</td>
            <td>
                <a href="/update/{{ job.id }}/" class="btn btn-warning btn-sm">Update</a>
                <a href="/delete/{{ job.id }}/" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5">No jobs added yet.</td>
        </tr>
        {% endfor %}
    </table>
</div>
</body>
</html>
